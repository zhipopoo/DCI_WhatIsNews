# ============================================================
# GitLab CI/CD — 每次推送到 main 分支自动部署到 K8s
# ============================================================
stages:
  - build
  - deploy

variables:
  NAMESPACE: "dci-news"
  DOCKER_REGISTRY: "swr.cn-hongkong-6001.sgcis.hksarg/andy_opr_test"
  FRONTEND_IMAGE: "$DOCKER_REGISTRY/news_frontend"
  BACKEND_IMAGE: "$DOCKER_REGISTRY/news_backend"

# ==================== Build Stage ====================
build-backend:
  stage: build
  image: maven:3.9-eclipse-temurin-21-alpine
  script:
    - cd backend
    - mvn package -DskipTests -B
    - docker login -u $DOCKER_USER -p $DOCKER_PASS $DOCKER_REGISTRY
    - docker build -t $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA -t $BACKEND_IMAGE:latest .
    - docker push $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $BACKEND_IMAGE:latest
  only:
    - main

build-frontend:
  stage: build
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run build
    - docker login -u $DOCKER_USER -p $DOCKER_PASS $DOCKER_REGISTRY
    - docker build -t $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA -t $FRONTEND_IMAGE:latest .
    - docker push $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $FRONTEND_IMAGE:latest
  only:
    - main

# ==================== Deploy Stage ====================
deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  before_script:
    - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    - mkdir -p ~/.kube && echo "$KUBECONFIG" | base64 -d > ~/.kube/config
  script:
    - chmod +x k8s/deploy.sh
    - ./k8s/deploy.sh $NAMESPACE
  only:
    - main
