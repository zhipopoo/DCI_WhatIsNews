apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: {{ .Values.namespace }}
  labels:
    app: news-frontend
data:
  default.conf: |
    server {
        listen       80;
        server_name  localhost;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

        # ---- Frontend static files ----
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;

            # HTML should not be cached (SPA entry point)
            location ~* \.html$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                expires 0;
            }
        }

        # Long-lived cache for versioned assets (Vite hashes filenames)
        location /assets/ {
            root   /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ---- API proxy to backend ----
        location /api/ {
            proxy_pass http://backend-svc.{{ .Values.namespace }}.svc.cluster.local:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Connection timeout — TCP handshake with backend
            proxy_connect_timeout 30s;

            # Send timeout — time to transmit request body to backend (for large uploads)
            proxy_send_timeout 600s;

            # Read timeout — time to wait for backend response.
            # Must be longer than the video-transcode timeout (600 s in the backend).
            proxy_read_timeout 720s;

            # Stream request body directly to backend without buffering to disk
            proxy_request_buffering off;

            # Retry if backend is still starting up
            proxy_next_upstream error timeout invalid_header http_502 http_503;
            proxy_next_upstream_tries 2;

            # Upload size limit
            client_max_body_size 2048m;
        }

        # ---- Static uploaded files (media) ----
        location /uploads/ {
            proxy_pass http://backend-svc.{{ .Values.namespace }}.svc.cluster.local:8080/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Timeouts for serving large media files
            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;

            # Stream large files directly — don't buffer into temp files
            proxy_buffering off;

            # Cache static media aggressively (content-hash filenames)
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ---- Security: hide server version ----
        server_tokens off;
    }
