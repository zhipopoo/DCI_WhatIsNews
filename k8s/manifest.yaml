#   resources:
#     requests:
#       storage: 5Gi

# ---
# ==================== Backend — Deployment ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-backend
  namespace: dci-news
  labels:
    app: news-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: news-backend
  template:
    metadata:
      labels:
        app: news-backend
    spec:
      imagePullSecrets:
        - name: default-secret
      containers:
        - name: backend
          image: swr.cn-hongkong-6001.sgcis.hksarg/andy_opr_test/news_backend:v1.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: dci-news-secret
          env:
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx1536m"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /api/news/featured/top?limit=1
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/news/featured/top?limit=1
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: config
          configMap:
            name: backend-config
        - name: uploads
          persistentVolumeClaim:
            claimName: backend-uploads-pvc

---
# ==================== Backend — Service ====================
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: dci-news
  labels:
    app: news-backend
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: news-backend

---
# ==================== Frontend — Nginx ConfigMap ====================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: dci-news
  labels:
    app: news-frontend
data:
  default.conf: |
    server {
        listen       80;
        server_name  localhost;

        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://backend-svc.dci-news.svc.cluster.local:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_next_upstream error timeout invalid_header http_502 http_503;

            client_max_body_size 20m;
        }

        location /uploads/ {
            proxy_pass http://backend-svc.dci-news.svc.cluster.local:8080/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

---
# ==================== Frontend — Deployment ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-frontend
  namespace: dci-news
  labels:
    app: news-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: news-frontend
  template:
    metadata:
      labels:
        app: news-frontend
    spec:
      imagePullSecrets:
        - name: default-secret
      containers:
        - name: frontend
          image: swr.cn-hongkong-6001.sgcis.hksarg/andy_opr_test/news_frontend:v1.1
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config

---
# ==================== Frontend — Service ====================
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: dci-news
  labels:
    app: news-frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: news-frontend
