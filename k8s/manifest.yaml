# ============================================================
# WhatIsNews — K8s All-in-One Manifest
# Namespace: dci-news
# Images:   Frontend v1.1 / Backend v1.1 / PostgreSQL 16
# Storage:  Huawei Cloud EVS encrypted disk (CSI)
# ============================================================
# Deploy:   kubectl apply -f k8s/manifest.yaml
# ============================================================

# ==================== Namespace ====================
# apiVersion: v1
# kind: Namespace
# metadata:
#   name: dci-news
#   labels:
#     app: whatisnews

# ---
# ==================== Secret ====================
# apiVersion: v1
# kind: Secret
# metadata:
#   name: dci-news-secret
#   namespace: dci-news
#   labels:
#     app: whatisnews
# type: Opaque
# stringData:
#   POSTGRES_DB: "whatisnews"
#   POSTGRES_USER: "whatisnews"
#   POSTGRES_PASSWORD: "whatisnews123"
#   SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-svc.dci-news.svc.cluster.local:5432/whatisnews"
#   SPRING_DATASOURCE_USERNAME: "whatisnews"
#   SPRING_DATASOURCE_PASSWORD: "whatisnews123"
#   JWT_SECRET: "WhatIsNews-JWT-Secret-Key-2024-Production"
#   JWT_EXPIRATION: "86400000"
#   ADMIN_DEFAULT_USERNAME: "admin"
#   ADMIN_DEFAULT_PASSWORD: "admin123"
#   FILE_UPLOAD_DIR: "/app/uploads"

# ---
# ==================== PostgreSQL — Service ====================
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: dci-news
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgres

---
# ==================== PostgreSQL — StatefulSet ====================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: dci-news
  labels:
    app: postgres
spec:
  serviceName: postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      imagePullSecrets:
        - name: default-secret
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: dci-news-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - whatisnews
                - -d
                - whatisnews
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - whatisnews
                - -d
                - whatisnews
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app: postgres
          failure-domain.beta.kubernetes.io/region: cn-hongkong-6001
          failure-domain.beta.kubernetes.io/zone: cn-hongkong-6001a
        annotations:
          everest.io/disk-volume-type: SSD
          everest.io/crypt-key-id: "2deb7b74-8f28-4252-be79-bf5b098b9a7f"
          everest.io/csi.data-encryption-algorithm: AES_256
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: csi-disk
        resources:
          requests:
            storage: 20Gi

---
# ==================== Backend — ConfigMap ====================
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: dci-news
  labels:
    app: news-backend
data:
  application.yml: |
    server:
      port: 8080

    spring:
      application:
        name: whatisnews-backend
      datasource:
        url: ${SPRING_DATASOURCE_URL}
        username: ${SPRING_DATASOURCE_USERNAME}
        password: ${SPRING_DATASOURCE_PASSWORD}
        driver-class-name: org.postgresql.Driver
        hikari:
          maximum-pool-size: 20
          minimum-idle: 5
          idle-timeout: 300000
          connection-timeout: 20000
      jpa:
        hibernate:
          ddl-auto: validate
        show-sql: false
        open-in-view: false
        properties:
          hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect
      flyway:
        enabled: true
        locations: classpath:db/migration
        baseline-on-migrate: true
        repair-on-migrate: true
      servlet:
        multipart:
          max-file-size: 20MB
          max-request-size: 20MB
      jackson:
        date-format: yyyy-MM-dd HH:mm:ss
        time-zone: Asia/Shanghai
        default-property-inclusion: non_null

    jwt:
      secret: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION}

    file:
      upload-dir: ${FILE_UPLOAD_DIR:/app/uploads}

    admin:
      default-username: ${ADMIN_DEFAULT_USERNAME}
      default-password: ${ADMIN_DEFAULT_PASSWORD}

    logging:
      level:
        root: INFO
        com.whatisnews: DEBUG
        org.springframework.security: INFO

---
# ==================== Backend — PVC (uploads) ====================
# apiVersion: v1
# kind: PersistentVolumeClaim
# metadata:
#   name: backend-uploads-pvc
#   namespace: dci-news
