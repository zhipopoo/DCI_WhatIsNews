server:
  port: 8080

spring:
  application:
    name: whatisnew-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/whatisnew}
    username: ${SPRING_DATASOURCE_USERNAME:whatisnew}
    password: ${SPRING_DATASOURCE_PASSWORD:whatisnew123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

  servlet:
    multipart:
      max-file-size: 2048MB
      max-request-size: 2048MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# CORS Configuration — override CORS_ALLOWED_ORIGIN_PATTERNS env var to restrict origins
cors:
  allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:*}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:WhatIsNew-JWT-Secret-Key-2024-Production}
  expiration: ${JWT_EXPIRATION:86400000}

# File Upload Configuration
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

# Default Admin Account
admin:
  default-username: ${ADMIN_DEFAULT_USERNAME:admin}
  default-password: ${ADMIN_DEFAULT_PASSWORD:admin123}

# Logging
logging:
  level:
    root: INFO
    com.whatisnew: DEBUG
    org.springframework.security: INFO
