version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: whatisnews-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whatisnews}
      POSTGRES_USER: ${POSTGRES_USER:-whatisnews}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whatisnews123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whatisnews} -d ${POSTGRES_DB:-whatisnews}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatisnews-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatisnews-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-whatisnews}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-whatisnews}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-whatisnews123}
      JWT_SECRET: ${JWT_SECRET:-WhatIsNews-JWT-Secret-Key-2024-Production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      FILE_UPLOAD_DIR: ${FILE_UPLOAD_DIR:-/app/uploads}
      ADMIN_DEFAULT_USERNAME: ${ADMIN_DEFAULT_USERNAME:-admin}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-admin123}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - whatisnews-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whatisnews-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - whatisnews-network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  whatisnews-network:
    driver: bridge
